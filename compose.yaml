services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: casa_mamulengo
      POSTGRES_USER: casa_mamulengo
      POSTGRES_PASSWORD: casa_mamulengo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casa_mamulengo -d casa_mamulengo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
